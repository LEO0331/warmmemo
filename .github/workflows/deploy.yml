name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 當推送到 main 分支時觸發
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # flutter-version: '3.40.0' # 可選：指定版本

      - name: Install dependencies
        run: flutter pub get

      - name: Write payment config
        run: |
          mkdir -p env
          if [ -n "${{ secrets.PAYMENT_DEV_JSON }}" ]; then
            cat > env/payment.dev.json << 'EOF'
          ${{ secrets.PAYMENT_DEV_JSON }}
          EOF
          else
            echo "{}" > env/payment.dev.json
          fi
          
      - name: Build Web
        # 重要：不使用 --web-renderer 參數（新版已移除），改由 index.html 控制
        # 確保 base-href 與你的 Repo 名稱一致
        run: flutter build web --release --base-href "/warmmemo/" --dart-define-from-file=env/payment.dev.json

      - name: Add SPA fallback for GitHub Pages
        run: cp build/web/index.html build/web/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          enable_jekyll: false
